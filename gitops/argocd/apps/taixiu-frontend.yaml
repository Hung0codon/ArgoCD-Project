apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taixiu-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Hung0codon/ArgoCD-Project.git
    targetRevision: main
    path: gitops/taixiu/frontend/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
