---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-deployment
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        volumeMounts:
        - name: datasource-volume
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboard-provider-volume
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboard-data-volume
          mountPath: /var/lib/grafana/dashboards
      volumes:
      - name: datasource-volume
        configMap:
          name: grafana-datasources
      - name: dashboard-provider-volume
        configMap:
          name: grafana-dashboards-provider
      - name: dashboard-data-volume
        configMap:
          name: grafana-dashboard-taixiu
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30090
  type: NodePort
